[mypy]
python_version = 3.11
strict = true
warn_return_any = true
warn_unused_ignores = true
follow_imports = silent

[mypy-pandas]
ignore_missing_imports = true

[mypy-pandas.*]
ignore_missing_imports = true

[mypy-pandas_ta]
ignore_missing_imports = true

[mypy-pandas_ta.*]
ignore_missing_imports = true

[mypy-mcp]
ignore_missing_imports = true

[mypy-mcp.*]
ignore_missing_imports = true
